<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unsubscribed — OutreachCommand</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f6f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .box { background: #fff; padding: 2.5rem 3rem; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); text-align: center; max-width: 420px; }
    h1 { color: #1a1a2e; margin-top: 0; }
    p { color: #718096; }
    .check { font-size: 3rem; margin-bottom: 1rem; }
  </style>
</head>
<body>
  <div class="box">
    <div class="check">&#10003;</div>
    <h1>You've been unsubscribed</h1>
    <p>Hi {{ name }}, you have been removed from our mailing list and will not receive any further emails.</p>
    <p style="font-size:0.85rem;color:#a0aec0;">If this was a mistake, please reply to any previous email.</p>
  </div>
</body>
</html>
