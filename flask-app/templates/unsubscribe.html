<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unsubscribed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f9fafb;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; color: #111827;
    }
    .box {
      background: #fff; border: 1px solid #e5e7eb;
      border-radius: 12px; padding: 40px;
      text-align: center; max-width: 400px; width: 90%;
    }
    .icon { font-size: 40px; margin-bottom: 16px; }
    h1 { font-size: 20px; font-weight: 600; margin-bottom: 12px; }
    p { font-size: 14px; color: #6b7280; line-height: 1.6; }
    .small { font-size: 12px; color: #9ca3af; margin-top: 20px; }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">✓</div>
    <h1>You've been unsubscribed</h1>
    <p>Hi {{ name }}, you've been removed from our mailing list and will receive no further emails.</p>
    <p class="small">Changed your mind? Reply to any previous email to re-subscribe.</p>
  </div>
</body>
</html>
